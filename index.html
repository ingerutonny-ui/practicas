<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background: #1a222e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        
        /* Contenedor padre centrado */
        .wrapper { 
            position: relative; 
            width: 350px; 
            height: 350px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* El formulario queda justo en el centro del wrapper */
        .login-box { 
            text-align: center; 
            color: white; 
            width: 100%;
            z-index: 2;
        }

        input { 
            display: block; 
            margin: 10px auto; 
            padding: 10px; 
            border-radius: 20px; 
            border: none; 
            background: #253140; 
            color: white; 
            width: 200px;
        }

        button { 
            padding: 10px 30px; 
            border-radius: 20px; 
            border: none; 
            background: #00f2ff; 
            cursor: pointer; 
            font-weight: 600; 
        }

        /* Líneas posicionadas absolutamente respecto al wrapper */
        .line { 
            position: absolute; 
            width: 3px; 
            height: 20px; 
            background: #30475e; 
            left: 174px; /* Centro del contenedor */
            top: 20px;   /* Distancia del borde */
            transform-origin: 1px 155px; /* Radio del círculo */
        }

        /* Clase aplicada por JS para iluminar */
        .line.active { background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>

<div class="wrapper" id="circle">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="user" placeholder="USUARIO">
        <input type="password" id="pass" placeholder="CONTRASEÑA">
        <button onclick="iniciarCarga()">INGRESO</button>
    </div>
</div>

<script>
    const circle = document.getElementById('circle');
    const totalLines = 40;

    // Generar las líneas estáticas
    for (let i = 0; i < totalLines; i++) {
        const line = document.createElement('div');
        line.className = 'line';
        line.style.transform = `rotate(${i * 9}deg)`;
        circle.appendChild(line);
    }

    function iniciarCarga() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (u === "RUBEN" && p === "12345") {
            const lines = document.querySelectorAll('.line');
            let i = 0;
            // Intervalo para encender línea por línea (5000ms / 40 líneas = 125ms cada una)
            const interval = setInterval(() => {
                if (i < lines.length) {
                    lines[i].classList.add('active');
                    i++;
                } else {
                    clearInterval(interval);
                    alert("Acceso concedido");
                    // Resetear para nueva prueba
                    lines.forEach(l => l.classList.remove('active'));
                }
            }, 125);
        } else {
            alert("Usuario o contraseña incorrectos");
        }
    }
</script>

</body>
</html>
