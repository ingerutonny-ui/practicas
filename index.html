<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background: #1a222e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        
        /* Contenedor principal que mantiene todo centrado y relativo */
        .wrapper { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Alineación del formulario dentro del círculo */
        .login-box { 
            text-align: center; 
            color: white; 
            width: 100%;
        }

        /* Estilo de los inputs */
        input { 
            display: block; 
            margin: 10px auto; 
            padding: 10px; 
            border-radius: 20px; 
            border: none; 
            background: #253140; 
            color: white; 
            width: 80%;
        }

        /* Botón de ingreso */
        button { 
            padding: 10px 30px; 
            border-radius: 20px; 
            border: none; 
            background: #00f2ff; 
            cursor: pointer; 
            font-weight: 600; 
            margin-top: 10px;
        }

        /* Líneas decorativas alrededor */
        .line { 
            position: absolute; 
            width: 2px; 
            height: 15px; 
            background: #30475e; 
            left: 150px; 
            transform-origin: 0 150px; 
        }

        /* Clase activada por JS al presionar ingreso */
        .loading .line { background: #00f2ff; transition: 0.5s; }
    </style>
</head>
<body>

<div class="wrapper" id="circle">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="user" placeholder="USUARIO">
        <input type="password" id="pass" placeholder="CONTRASEÑA">
        <button onclick="validar()">INGRESO</button>
    </div>
</div>

<script>
    // Generación dinámica de las líneas radiales
    const circle = document.getElementById('circle');
    for (let i = 0; i < 40; i++) {
        const line = document.createElement('div');
        line.className = 'line';
        line.style.transform = `rotate(${i * 9}deg)`;
        circle.appendChild(line);
    }

    // Lógica de validación
    function validar() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (u === "RUBEN" && p === "12345") {
            circle.classList.add('loading');
            // Simulación de carga de 5 segundos
            setTimeout(() => {
                alert("Acceso concedido");
                circle.classList.remove('loading');
            }, 5000);
        } else {
            alert("Usuario o contraseña incorrectos");
        }
    }
</script>

</body>
</html>
