<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilos base para centrar y fondo oscuro */
        body { background: #1a222e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        
        /* Contenedor del circulo con las lineas radiales */
        .login-container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }
        .circle-lines { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; }
        
        /* Generador de lineas radiales para el borde */
        .line { position: absolute; width: 2px; height: 15px; background: #30475e; left: 50%; transform-origin: 0 150px; }
        
        /* Animacion de carga que cambia el color de las lineas */
        .loading .line { background: #00f2ff; transition: 0.5s; }
        
        /* Estilos del formulario y inputs */
        .login-box { z-index: 1; text-align: center; color: white; }
        input { display: block; margin: 10px auto; padding: 10px; border-radius: 20px; border: none; background: #253140; color: white; }
        button { padding: 10px 30px; border-radius: 20px; border: none; background: #00f2ff; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-container" id="circle">
    <!-- El JavaScript generará las líneas aquí -->
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="USUARIO">
        <!-- El atributo type="password" oculta automáticamente el texto con asteriscos -->
        <input type="password" placeholder="CONTRASEÑA">
        <button onclick="iniciarSesion()">INGRESO</button>
    </div>
</div>

<script>
    // Generar 40 líneas alrededor del círculo
    const circle = document.getElementById('circle');
    for (let i = 0; i < 40; i++) {
        const line = document.createElement('div');
        line.className = 'line';
        line.style.transform = `rotate(${i * 9}deg)`;
        circle.appendChild(line);
    }

    // Función de carga al presionar INGRESO
    function iniciarSesion() {
        const lines = document.querySelectorAll('.line');
        circle.classList.add('loading'); // Activa la animación CSS
        
        // Simulación de espera de 5 segundos antes de terminar el proceso
        setTimeout(() => {
            circle.classList.remove('loading');
            alert("Revisión completada");
        }, 5000);
    }
</script>

</body>
</html>
