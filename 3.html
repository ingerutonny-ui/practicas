<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilos base del botón */
        .submit {
            cursor: pointer;
            position: relative;
            padding: 10px 20px;
            font-size: 36px;
            width: 250px;
            border-radius: 4px;
            background: transparent;
            color: white;
            border: 2px solid white;
            overflow: hidden; /* Mantiene el color de fondo dentro de los bordes */
            transition: all 0.5s; /* Suaviza los cambios */
        }

        /* Barra de carga que se expande */
        .submit::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0; /* Inicia sin relleno */
            background: green;
            z-index: -1;
            transition: width 2s linear; /* Controla la velocidad de llenado */
        }

        /* Activa el llenado de la barra */
        .submit.processing::after {
            width: 100%;
        }

        /* Estado final cuando termina */
        .submit.submitted {
            background: green;
            border-color: green;
        }
    </style>
</head>
<body>

    <!-- El botón -->
    <button id="submitBtn" class="submit">Submit</button>

    <script>
        const btn = document.getElementById('submitBtn');

        btn.addEventListener('click', () => {
            // Cambia el texto al iniciar
            btn.textContent = "Processing";
            // Activa la clase que llena la barra con CSS
            btn.classList.add('processing');

            // Simulación de proceso (2 segundos)
            setTimeout(() => {
                // Quita la carga y aplica el estilo final
                btn.classList.remove('processing');
                btn.classList.add('submitted');
                btn.textContent = "✓ Submitted";
            }, 2000); 
        });
    </script>
</body>
</html>
