<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Botón Animado</title>
    <style>
        /* Estilos base */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
        }

        .submit {
            cursor: pointer;
            position: relative;
            padding: 10px 20px;
            font-size: 36px;
            width: 250px;
            border-radius: 4px;
            background: transparent;
            color: white;
            border: 2px solid white;
            overflow: hidden;
            transition: all 0.5s;
        }

        .submit::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: green;
            z-index: -1;
            transition: width 2s linear;
        }

        .submit.processing::after {
            width: 100%;
        }

        .submit.submitted {
            background: green;
            border-color: green;
        }
    </style>
</head>
<body>

    <button id="submitBtn" class="submit">Submit</button>

    <script>
        const btn = document.getElementById('submitBtn');

        btn.addEventListener('click', () => {
            btn.textContent = "Processing";
            btn.classList.add('processing');

            setTimeout(() => {
                btn.classList.remove('processing');
                btn.classList.add('submitted');
                btn.textContent = "✓ Submitted";
            }, 2000); 
        });
    </script>
</body>
</html>
