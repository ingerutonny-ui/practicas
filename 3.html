<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Botón Animado</title>
    <style>
        /* Centramos el botón en la pantalla para asegurar visibilidad */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
        }

        /* Estilos base del botón */
        .submit {
            cursor: pointer;
            position: relative;
            padding: 10px 20px;
            font-size: 36px;
            width: 250px;
            border-radius: 4px;
            background: transparent;
            color: white;
            border: 2px solid white;
            overflow: hidden; /* Oculta el desbordamiento del relleno */
            transition: all 0.5s; /* Transición suave */
        }

        /* Barra de progreso animada dentro del botón */
        .submit::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0; /* Inicia en 0% */
            background: green;
            z-index: -1;
            transition: width 2s linear; /* Duración de la animación */
        }

        /* Clase activada por JS para llenar la barra */
        .submit.processing::after {
            width: 100%;
        }

        /* Estilo para el estado de éxito */
        .submit.submitted {
            background: green;
            border-color: green;
        }
    </style>
</head>
<body>

    <button id="submitBtn" class="submit">Submit</button>

    <script>
        const btn = document.getElementById('submitBtn');

        // Escucha el evento clic para iniciar la secuencia
        btn.addEventListener('click', () => {
            // Cambia el texto al iniciar el proceso
            btn.textContent = "Processing";
            // Añade la clase que dispara el CSS de la animación
            btn.classList.add('processing');

            // Temporizador para simular la finalización del proceso
            setTimeout(() => {
                // Aplica estilos de éxito
                btn.classList.remove('processing');
                btn.classList.add('submitted');
                btn.textContent = "✓ Submitted";
            }, 2000); // 2000ms coinciden con la duración CSS
        });
    </script>
</body>
</html>
